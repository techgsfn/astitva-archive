<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>{{TITLE}} | Astitva Archive</title>

<link rel="canonical" href="{{PAGE_URL}}">
<link rel="cite-as" href="https://doi.org/{{DOI}}">

<meta name="description" content="{{ABSTRACT}}">
<meta name="author" content="{{AUTHOR_NAME}}">
<meta name="robots" content="index, follow">

<meta name="citation_title" content="{{TITLE}}">
<meta name="citation_author" content="{{AUTHOR_NAME}}">
<meta name="citation_publication_date" content="{{DATE}}">
<meta name="citation_doi" content="{{DOI}}">
<meta name="citation_pdf_url" content="{{PDF_URL}}">
<meta name="citation_fulltext_html_url" content="{{PAGE_URL}}">

<link rel="stylesheet" href="/assets/css/style.css">

</head>

<body>

<article>

<h1>{{TITLE}}</h1>
<p><strong>{{AUTHOR_NAME}}</strong></p>

<section>
<h2>Publication Details</h2>
<dl>
<dt>Identifier</dt><dd>{{AST_ID}}</dd>
<dt>DOI</dt><dd><a href="https://doi.org/{{DOI}}">{{DOI}}</a></dd>
<dt>Year</dt><dd>{{YEAR}}</dd>
<dt>PDF</dt><dd><a href="{{PDF_URL}}">Download</a></dd>
</dl>
</section>

<section>
<h2>Abstract</h2>
<p>{{ABSTRACT}}</p>
</section>

<footer>
© {{YEAR}} Global Synergetic Foundation
</footer>

</article>

</body>
</html>
